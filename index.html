<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Bitácora del Balneario</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f0e4d0;min-height:100vh;display:flex;justify-content:center;padding:20px 12px;font-family:'Inter',sans-serif}
    #app{width:100%;max-width:760px;background:#FBF3E7;border-radius:18px;padding:22px}

    /* header */
    .header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;margin-bottom:18px}
    .header-left{display:flex;align-items:center;gap:10px}
    .header-left h1{font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:#1F2A2E}
    .header-left p{font-size:12.5px;color:#5C6B6E;margin-top:2px}
    .counter-num{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:700;color:#1B5E63;display:block}
    .counter-lbl{font-size:11px;color:#5C6B6E;text-transform:uppercase;letter-spacing:.06em}

    /* tabs */
    .tabs{display:flex;gap:6px;background:#F0E4D0;padding:5px;border-radius:12px;margin-bottom:18px}
    .tabs button{flex:1;padding:9px 8px;border:none;background:transparent;border-radius:9px;font-size:13px;font-weight:500;color:#5C6B6E;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
    .tabs button.on{background:#1B5E63;color:#fff}

    /* sections */
    .sec{display:flex;flex-direction:column;gap:16px}
    .hidden{display:none}

    /* datebar */
    .datebar{display:flex;align-items:center;gap:10px}
    .dbbtn{background:#fff;border:1px solid #F0E4D0;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px}
    .dblabel{font-weight:600;font-size:14px;flex:1;color:#1F2A2E}
    .today-btn{background:#fff;border:1px solid #F0E4D0;padding:0 12px;height:32px;border-radius:8px;font-size:12px;font-weight:600;color:#1B5E63;cursor:pointer}

    /* add panel */
    .panel{background:#fff;border:1px solid #F0E4D0;border-radius:14px;padding:16px}
    .time-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;color:#5C6B6E}
    .time-row input{font-family:'JetBrains Mono',monospace;border:1px solid #F0E4D0;border-radius:7px;padding:5px 8px;font-size:13px;background:#FBF3E7;color:#1F2A2E}
    .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .cat-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 6px;border-radius:11px;border:1.5px solid var(--c);background:color-mix(in srgb,var(--c) 8%,white);cursor:pointer;transition:transform .12s;font-family:'Inter',sans-serif}
    .cat-btn:hover{transform:translateY(-2px)}
    .cat-icon{font-size:20px}
    .cat-lbl{font-weight:600;font-size:13px;color:#1F2A2E}
    .cat-sub{font-size:10.5px;color:#5C6B6E}

    /* list */
    .list-hdr{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;color:#5C6B6E;padding:0 2px}
    .badge{background:#F0E4D0;padding:2px 9px;border-radius:20px;font-family:'JetBrains Mono',monospace;color:#1F2A2E}
    .empty{display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;padding:36px 20px;color:#5C6B6E;background:#fff;border:1.5px dashed #F0E4D0;border-radius:14px;font-size:13.5px}

    /* tickets */
    .tickets{display:flex;flex-direction:column;gap:8px}
    .ticket{display:flex;align-items:center;background:#fff;border:1.5px solid #F0E4D0;border-left:5px solid var(--c);border-radius:11px;padding:10px 14px;gap:14px}
    .t-div{width:0;border-left:1.5px dashed #F0E4D0;align-self:stretch;margin:2px 0}
    .t-side{display:flex;align-items:center;gap:9px;flex:1}
    .t-cat{font-size:12.5px;font-weight:600;color:#1F2A2E}
    .t-time{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#5C6B6E}
    .exit-form{display:flex;align-items:center;gap:6px}
    .exit-form input{font-family:'JetBrains Mono',monospace;font-size:12px;border:1px solid #F0E4D0;border-radius:6px;padding:3px 6px}
    .exit-btn{background:#1B5E63;border:none;color:#fff;width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:14px}
    .del-btn{background:transparent;border:none;color:#C9B9A0;cursor:pointer;font-size:16px;padding:0 2px}
    .del-btn:hover{color:#A8442D}

    /* stats */
    .toggle{display:flex;gap:8px}
    .toggle button{flex:1;background:#fff;border:1.5px solid #F0E4D0;border-radius:10px;padding:9px;font-size:12.5px;font-weight:600;color:#5C6B6E;cursor:pointer;font-family:'Inter',sans-serif}
    .toggle button.on{border-color:#1B5E63;color:#1B5E63;background:color-mix(in srgb,#1B5E63 7%,white)}
    .stat-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .stat-card{display:flex;flex-direction:column;align-items:center;gap:3px;background:#fff;border:1px solid #F0E4D0;border-top:3px solid var(--c);border-radius:12px;padding:14px 6px}
    .stat-num{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#1F2A2E}
    .stat-lbl{font-size:11.5px;color:#5C6B6E}
    .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .card{background:#fff;border:1px solid #F0E4D0;border-radius:14px;padding:14px}
    .card h3{font-family:'Fraunces',serif;font-size:14.5px;font-weight:600;margin-bottom:12px;color:#1F2A2E}

    /* bar chart */
    .barchart{display:flex;align-items:flex-end;gap:3px;height:140px;padding-top:8px}
    .barcol{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:0}
    .barfill{width:100%;border-radius:4px 4px 0 0;min-height:2px}
    .barlbl{font-size:9px;color:#5C6B6E;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
    .barval{font-family:'JetBrains Mono',monospace;font-size:10px;color:#1F2A2E;font-weight:600}

    /* pie */
    .pie-wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
    .pie-legend{display:flex;flex-direction:column;gap:8px;flex:1}
    .pie-item{display:flex;align-items:center;gap:6px;font-size:12.5px;color:#1F2A2E}
    .pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

    /* avg */
    .avg-rows{display:flex;flex-direction:column;gap:8px}
    .avg-row{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 0;border-bottom:1px solid #F0E4D0}
    .avg-row:last-child{border-bottom:none}
    .avg-val{font-family:'JetBrains Mono',monospace;font-weight:600;color:#5C6B6E;margin-left:auto}

    /* recs */
    .recs{display:flex;flex-direction:column;gap:10px}
    .rec-card{background:#fff;border:1px solid #F0E4D0;border-left:4px solid #C98E04;border-radius:11px;padding:12px 14px}
    .rec-tag{display:inline-block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#C98E04;margin-bottom:5px}
    .rec-p{font-size:13.5px;line-height:1.5;color:#1F2A2E}

    .footer{text-align:center;font-size:11px;color:#5C6B6E;margin-top:6px;opacity:.8}
    .err{background:#FBE4DD;color:#A8442D;border:1px solid #E8A688;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px}

    @media(max-width:560px){.charts-grid,.cat-grid,.stat-cards{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const CATS=[
  {key:"nino",        label:"Niño",        sub:"0–12 años",  icon:"👶",color:"#D97A52"},
  {key:"adulto",      label:"Adulto",       sub:"13–59 años", icon:"👤",color:"#1B5E63"},
  {key:"adulto_mayor",label:"Adulto mayor", sub:"60+ años",   icon:"🧓",color:"#C98E04"},
];
const DAYS_LU=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const DAYS_OR=["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];

// ── utils ────────────────────────────────────────────────
const todayStr=()=>new Date().toISOString().slice(0,10);
const nowTime =()=>new Date().toTimeString().slice(0,5);
const shift   =(d,n)=>{const dt=new Date(d+"T00:00:00");dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10)};
const dlabel  =(d)=>{const dt=new Date(d+"T00:00:00");const s=dt.toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"});return s[0].toUpperCase()+s.slice(1)};
const dowName =(d)=>DAYS_LU[new Date(d+"T00:00:00").getDay()];
const minBetw =(t1,t2)=>{const[h1,m1]=t1.split(":").map(Number);const[h2,m2]=t2.split(":").map(Number);return h2*60+m2-(h1*60+m1)};
const fmtMin  =(m)=>{if(m==null)return"—";const h=Math.floor(m/60),mm=m%60;return h>0?`${h}h ${mm}min`:`${mm}min`};
const catInfo =(k)=>CATS.find(c=>c.key===k);
const lsGet   =(k)=>{try{const r=localStorage.getItem(k);return r?JSON.parse(r):null}catch{return null}};
const lsSet   =(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));return true}catch{return false}};
const esc     =(s)=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

// ── state ────────────────────────────────────────────────
let state={
  selDate:todayStr(),
  allDates:lsGet("visit-days")||[],
  allVisits:{},
  tab:"registro",
  entryTime:nowTime(),
  scope:"dia",
};
state.allDates.forEach(d=>{state.allVisits[d]=lsGet(`visits:${d}`)||[]});

function persist(date,newVisits){
  state.allVisits[date]=newVisits;
  lsSet(`visits:${date}`,newVisits);
  if(!state.allDates.includes(date)){
    state.allDates=[...state.allDates,date].sort();
    lsSet("visit-days",state.allDates);
  }
}
function addVisit(key){
  const visits=state.allVisits[state.selDate]||[];
  const v={id:`${Date.now()}-${Math.random().toString(36).slice(2,7)}`,category:key,entryTime:state.entryTime||nowTime(),exitTime:null};
  persist(state.selDate,[...visits,v].sort((a,b)=>a.entryTime.localeCompare(b.entryTime)));
  render();
}
function markExit(id){
  const visits=state.allVisits[state.selDate]||[];
  const inp=document.getElementById("x-"+id);
  const t=(inp?inp.value:null)||nowTime();
  persist(state.selDate,visits.map(v=>v.id===id?{...v,exitTime:t}:v));
  render();
}
function delVisit(id){
  const visits=state.allVisits[state.selDate]||[];
  persist(state.selDate,visits.filter(v=>v.id!==id));
  render();
}

// ── chart helpers ─────────────────────────────────────────
function renderBar(data,color="#1B5E63"){
  const max=Math.max(...data.map(d=>d.count),1);
  return`<div class="barchart">${data.map(d=>`
    <div class="barcol">
      ${d.count?`<span class="barval">${d.count}</span>`:""}
      <div class="barfill" style="height:${Math.max(d.count/max*100,1)}%;background:${color}"></div>
      <span class="barlbl">${esc(d.label||d.hour||"")}</span>
    </div>`).join("")}</div>`;
}
function renderPie(data){
  const total=data.reduce((s,d)=>s+d.count,0)||1;
  let a=0;
  const slices=data.map(d=>{const pct=d.count/total,a1=a,a2=a+pct*360;a=a2;return{...d,a1,a2,pct}});
  const grad=slices.map(s=>`${s.color} ${s.a1}deg ${s.a2}deg`).join(",");
  return`<div class="pie-wrap">
    <div style="width:120px;height:120px;border-radius:50%;background:conic-gradient(${grad});position:relative;flex-shrink:0">
      <div style="position:absolute;inset:25%;background:#FBF3E7;border-radius:50%"></div>
    </div>
    <div class="pie-legend">${slices.map(s=>`
      <div class="pie-item">
        <div class="pie-dot" style="background:${s.color}"></div>
        <span>${esc(s.label)} — <strong>${s.count}</strong> (${Math.round(s.pct*100)}%)</span>
      </div>`).join("")}
    </div></div>`;
}

// ── render ────────────────────────────────────────────────
function render(){
  const {selDate,allDates,allVisits,tab,scope}=state;
  const visits=allVisits[selDate]||[];
  const flat=Object.entries(allVisits).flatMap(([d,l])=>l.map(v=>({...v,date:d})));
  const src=scope==="dia"?visits:flat;
  const counts=CATS.map(c=>({...c,count:src.filter(v=>v.category===c.key).length}));

  const hourly=(()=>{
    const b={};for(let h=6;h<=22;h++)b[h]=0;
    src.forEach(v=>{const h=parseInt(v.entryTime,10);if(b[h]!==undefined)b[h]++});
    return Object.entries(b).map(([h,count])=>({hour:`${h}h`,count,label:`${h}h`}));
  })();

  const avgStay=CATS.map(c=>{
    const w=src.filter(v=>v.category===c.key&&v.exitTime);
    if(!w.length)return{...c,avg:null};
    return{...c,avg:Math.round(w.reduce((s,v)=>s+minBetw(v.entryTime,v.exitTime),0)/w.length)};
  });

  const dowStats=(()=>{
    const acc={};
    DAYS_OR.forEach(d=>acc[d]={day:d,total:0,nino:0,adulto:0,adulto_mayor:0});
    Object.entries(allVisits).forEach(([date,list])=>{
      const dow=dowName(date);
      list.forEach(v=>{acc[dow].total++;acc[dow][v.category]=(acc[dow][v.category]||0)+1});
    });
    return acc;
  })();

  const recs=(()=>{
    const r=[];
    const days=DAYS_OR.map(d=>dowStats[d]).filter(v=>v.total>0);
    if(days.length<2)return r;
    days.forEach(v=>{
      const shares=CATS.map(c=>({label:c.label,share:v[c.key]/v.total}));
      const top=shares.sort((a,b)=>b.share-a.share)[0];
      if(top.share>=0.4)r.push({day:v.day,text:`Los ${v.day.toLowerCase()} predomina "${top.label.toLowerCase()}" (${Math.round(top.share*100)}%). Ideal para una promoción para ese grupo.`});
    });
    const sorted=[...days].sort((a,b)=>b.total-a.total);
    if(sorted.length>=2&&sorted[0].day!==sorted[sorted.length-1].day){
      const[busy,quiet]=[sorted[0],sorted[sorted.length-1]];
      r.push({day:quiet.day,text:`${quiet.day} es el día con menos visitas (vs ${busy.day}). Un descuento podría equilibrar la ocupación.`});
    }
    const peak=[...hourly].sort((a,b)=>b.count-a.count)[0];
    if(peak&&peak.count>0)r.push({day:"Todos los días",text:`La hora pico es ${peak.hour}. Un precio reducido antes o después ayuda a repartir el aforo.`});
    return r;
  })();

  // ── HTML ──────────────────────────────────────────────
  document.getElementById("app").innerHTML=`
  <header class="header">
    <div class="header-left">
      <span style="font-size:26px">☀️</span>
      <div><h1>Bitácora del Balneario</h1><p>Registro y estadísticas de visitantes</p></div>
    </div>
    <div style="text-align:right">
      <span class="counter-num">${String((allVisits[todayStr()]||[]).length).padStart(3,"0")}</span>
      <span class="counter-lbl">visitas hoy</span>
    </div>
  </header>

  <nav class="tabs">
    <button class="${tab==="registro"?"on":""}" onclick="setTab('registro')">➕ Registro</button>
    <button class="${tab==="estadisticas"?"on":""}" onclick="setTab('estadisticas')">📊 Estadísticas</button>
    <button class="${tab==="recomendaciones"?"on":""}" onclick="setTab('recomendaciones')">💡 Recomendaciones</button>
  </nav>

  ${tab==="registro"?`
  <section class="sec">
    <div class="datebar">
      <button class="dbbtn" onclick="nav(-1)">◀</button>
      <div class="dblabel">📅 ${esc(dlabel(selDate))}</div>
      <button class="dbbtn" onclick="nav(1)">▶</button>
      ${selDate!==todayStr()?`<button class="today-btn" onclick="goToday()">Hoy</button>`:""}
    </div>

    <div class="panel">
      <div class="time-row">🕐 <label>Hora de entrada</label>
        <input type="time" id="entry-time" value="${state.entryTime}" oninput="state.entryTime=this.value"/>
      </div>
      <div class="cat-grid">
        ${CATS.map(c=>`
          <button class="cat-btn" style="--c:${c.color}" onclick="addVisit('${c.key}')">
            <span class="cat-icon">${c.icon}</span>
            <span class="cat-lbl">${esc(c.label)}</span>
            <span class="cat-sub">${esc(c.sub)}</span>
          </button>`).join("")}
      </div>
    </div>

    <div class="list-hdr"><span>Visitantes registrados</span><span class="badge">${visits.length}</span></div>

    ${visits.length===0
      ?`<div class="empty">☀️<p>Sin visitas hoy. Usa los botones de arriba para empezar.</p></div>`
      :`<div class="tickets">${visits.map(v=>{
        const c=catInfo(v.category);
        return`<div class="ticket" style="--c:${c.color}">
          <div class="t-side">
            <span style="font-size:18px">${c.icon}</span>
            <div><div class="t-cat">${esc(c.label)}</div><div class="t-time">Entrada · ${esc(v.entryTime)}</div></div>
          </div>
          <div class="t-div"></div>
          <div class="t-side">
            ${v.exitTime
              ?`<div><div class="t-cat">Salió</div><div class="t-time">${esc(v.exitTime)} · ${fmtMin(minBetw(v.entryTime,v.exitTime))}</div></div>`
              :`<div class="exit-form">
                <input type="time" id="x-${v.id}" value="${nowTime()}"/>
                <button class="exit-btn" onclick="markExit('${v.id}')">🚪</button>
              </div>`}
          </div>
          <button class="del-btn" onclick="delVisit('${v.id}')">🗑️</button>
        </div>`;}).join("")}</div>`}
  </section>`:""}

  ${tab==="estadisticas"?`
  <section class="sec">
    <div class="toggle">
      <button class="${scope==="dia"?"on":""}" onclick="setScope('dia')">${esc(dlabel(selDate))}</button>
      <button class="${scope==="historico"?"on":""}" onclick="setScope('historico')">Histórico (${allDates.length} ${allDates.length===1?"día":"días"})</button>
    </div>
    ${src.length===0
      ?`<div class="empty">📈<p>Sin datos para este filtro.</p></div>`
      :`<div class="stat-cards">
          ${counts.map(c=>`<div class="stat-card" style="--c:${c.color}">
            <span style="font-size:18px">${c.icon}</span>
            <span class="stat-num">${c.count}</span>
            <span class="stat-lbl">${esc(c.label)}</span>
          </div>`).join("")}
        </div>
        <div class="charts-grid">
          <div class="card"><h3>Composición del público</h3>${renderPie(counts.filter(c=>c.count>0))}</div>
          <div class="card"><h3>Entradas por hora</h3>${renderBar(hourly,"#1B5E63")}</div>
        </div>
        <div class="card"><h3>Duración media de la visita</h3>
          <div class="avg-rows">${avgStay.map(c=>`
            <div class="avg-row">
              <span>${c.icon}</span><span style="flex:1">${esc(c.label)}</span>
              <span class="avg-val">${fmtMin(c.avg)}</span>
            </div>`).join("")}
          </div>
        </div>
        ${scope==="historico"?`<div class="card"><h3>Total por día de la semana</h3>
          ${renderBar(DAYS_OR.map(d=>({...dowStats[d],label:d.slice(0,3)})),"#1B5E63")}
        </div>`:""}
      `}
  </section>`:""}

  ${tab==="recomendaciones"?`
  <section class="sec">
    ${recs.length===0
      ?`<div class="empty">💡<p>Registra visitas en al menos 2 días distintos para ver recomendaciones.</p></div>`
      :`<div class="recs">${recs.map(r=>`
        <div class="rec-card">
          <div class="rec-tag">${esc(r.day)}</div>
          <p class="rec-p">${esc(r.text)}</p>
        </div>`).join("")}</div>`}
  </section>`:""}

  <footer class="footer">Tus datos se guardan localmente en este dispositivo.</footer>`;
}

// ── actions (globales) ────────────────────────────────────
function setTab(t){state.tab=t;render()}
function setScope(s){state.scope=s;render()}
function nav(n){state.selDate=shift(state.selDate,n);render()}
function goToday(){state.selDate=todayStr();render()}

render();
</script>
</body>
</html>
